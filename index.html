
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Monitoramento de Consumo de Energia na Nuvem</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <h1>Painel de Monitoramento de Consumo de Energia</h1>
        <div class="grid-container">
            <div class="grid-item">
                <h2>Consumo de CPU</h2>
                <canvas id="cpuChart"></canvas>
            </div>
            <div class="grid-item">
                <h2>Consumo de Memória</h2>
                <canvas id="memoryChart"></canvas>
            </div>
            <div class="grid-item">
                <h2>Consumo de Rede</h2>
                <canvas id="networkChart"></canvas>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
